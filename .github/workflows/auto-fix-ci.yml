name: Auto-fix CI Failures

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  autofix:
    name: Claude CI Auto-fix
    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch != 'main' &&
      github.event.workflow_run.head_commit.author.name != 'claude[bot]' &&
      github.event.workflow_run.head_repository.id == github.repository_id
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      actions: read
      # Required by anthropics/claude-code-action when using claude_code_oauth_token:
      # the action fetches a GitHub OIDC token internally to verify the workflow's
      # identity before accepting the OAuth token.
      id-token: write

    steps:
      - name: Sanitize workflow_run inputs
        id: sanitize
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          echo "head_branch=${HEAD_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "id=${RUN_ID}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          # No ref — checks out the default branch (main). Claude fetches
          # and switches to the failing branch in the prompt steps below.

      # Cache keys are hashed from the default-branch (main) lockfiles because
      # the workspace is still on main at this point. Claude switches to the
      # failing branch below; composer install / npm ci then corrects any drift.
      - name: Cache Composer deps
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Cache npm deps
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - uses: anthropics/claude-code-action@d44caa1f5268e7643c11e317db4c2ad1e5ea3211 # v1
        with:
          # Max plan: use OAuth token (run `claude setup-token` locally, store as CLAUDE_CODE_OAUTH_TOKEN)
          # API key:  uncomment the line below and remove claude_code_oauth_token
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          prompt: |
            The CI workflow just failed on branch `${{ steps.sanitize.outputs.head_branch }}`.

            Steps:
            1. Run `gh run view ${{ steps.sanitize.outputs.id }} --log-failed --repo ${{ github.repository }}` to read the exact error output.
            2. Identify the root cause (PHPCS violation, PHPUnit failure, or JS/CSS lint error).
            3. Fix only the failing code — do not refactor unrelated areas.
            4. Fetch and check out the original branch so you can push directly to it:
               ```bash
               git fetch origin "${{ steps.sanitize.outputs.head_branch }}"
               git checkout "${{ steps.sanitize.outputs.head_branch }}"
               ```
            5. Commit the fix with a descriptive message, then push directly to the original branch:
               ```bash
               git push origin "${{ steps.sanitize.outputs.head_branch }}"
               ```
               Do NOT create a new branch. Do NOT open a new pull request.
               The fix must land on `${{ steps.sanitize.outputs.head_branch }}` itself so it
               is immediately visible in the existing PR without any additional review step.

            Constraints:
            - PHP: follow WordPress Coding Standards (PHPCS ruleset in phpcs.xml.dist). Prefix functions with `nj_` or use `Plume\` namespace.
            - JS/CSS: fix only what the linter flags — do not change formatting elsewhere.
            - PHPUnit: fix the code under test, not the tests themselves, unless the test assertion is clearly wrong.
            - Do NOT bump version numbers, modify composer.lock, or change package-lock.json.

          claude_args: "--allowedTools Bash(git:*),Bash(gh:*),Bash(composer:*),Bash(npm:*),Bash(npx:*),Bash(./vendor/bin/phpcs:*),Bash(./vendor/bin/phpunit:*),Read,Edit,MultiEdit,Write,Glob,Grep,LS"
