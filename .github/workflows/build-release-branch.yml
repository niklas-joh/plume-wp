name: Build Release Branch

# Triggered manually when it's time to cut a release from `develop`.
#
# The workflow:
#   1. Finds all semantic labels (feat:, feat!:, fix:) in the repo; for each
#      label whose PRs carry `release-ready`, bundles ALL merged PRs with that
#      label so multi-PR features always ship as a unit.
#   2. Creates a `release/vX.Y.Z` branch from `main` and cherry-picks those
#      merge commits onto it.
#   3. Derives the next version automatically via `semantic-release --dry-run`.
#   4. Bumps version numbers in wp-ai-mind.php (×2), readme.txt, package.json,
#      and prepends a CHANGELOG entry.
#   5. Commits, pushes the branch, and opens a PR to `main`.
#
# No version input is required — the version comes entirely from conventional
# commit messages on the cherry-picked commits.
#
# After the PR is reviewed and merged, `tag-release-merge.yml` automatically
# creates the `vX.Y.Z` tag, which triggers the existing `release.yml` to build
# the zip and publish the GitHub Release.

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    name: Build release branch
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── Step 1: Ensure the release-ready label exists ─────────────────────

      - name: Ensure release-ready label exists
        run: |
          gh label create "release-ready" \
            --color "#0e8a16" \
            --description "Include this feature in the next release branch" \
            --repo "${{ github.repository }}" 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 2: Find release-ready merge commits via semantic labels ──────────
      #
      # The new semantic-tag system applies a label (feat: <slug>, feat!: <slug>,
      # fix: <slug>) to every PR.  When the user applies `release-ready` to any
      # one PR in a semantic group, ALL merged PRs with that same label are
      # bundled into the release — ensuring multi-PR features ship as a unit.
      #
      # hotfix: labels are intentionally excluded; hotfixes target `main`
      # directly and bypass this release-branch workflow entirely.

      - name: Collect release-ready merge commits
        id: collect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git fetch --tags

          # List all semantic labels in the repo (feat:, feat!:, fix: only).
          ALL_SEM_LABELS=$(gh label list \
            --repo "${{ github.repository }}" \
            --limit 200 \
            --json name \
            --jq '[.[].name | select(test("^(feat[!]?|fix): "))] | .[]')

          if [ -z "$ALL_SEM_LABELS" ]; then
            echo "::error::No semantic labels found. Ensure tag-infer.yml has run on at least one merged PR."
            exit 1
          fi

          SELECTED_SHAS=""
          FEATURE_LIST=""

          while IFS= read -r LABEL; do
            [ -z "$LABEL" ] && continue

            # Does any merged PR with this label also carry release-ready?
            COUNT=$(gh pr list \
              --repo "${{ github.repository }}" \
              --label "$LABEL" \
              --label "release-ready" \
              --state merged \
              --json number \
              --jq 'length')

            if [ "$COUNT" -eq 0 ]; then
              echo "Skipping label '${LABEL}' — no release-ready PRs."
              continue
            fi

            echo "Processing label '${LABEL}' — bundling all merged PRs in this group."

            # Collect ALL merged PRs with this semantic label (bundle the group).
            while IFS=$'\t' read -r SHA PR_NUM; do
              [ -z "$SHA" ] && continue
              echo "  Selected: PR #${PR_NUM} [${LABEL}] — ${SHA}"
              SELECTED_SHAS="${SELECTED_SHAS} ${SHA}"
              FEATURE_LIST="${FEATURE_LIST}\n- ${LABEL} (PR #${PR_NUM})"
            done < <(gh pr list \
              --repo "${{ github.repository }}" \
              --label "$LABEL" \
              --state merged \
              --json number,mergeCommit \
              --jq '.[] | [.mergeCommit.oid, (.number | tostring)] | @tsv')

          done <<< "$ALL_SEM_LABELS"

          if [ -z "$(echo "$SELECTED_SHAS" | tr -d ' ')" ]; then
            echo "::error::No release-ready features found. Apply the 'release-ready' label to merged PRs before building a release."
            exit 1
          fi

          # Deduplicate and sort by commit date (oldest first) for clean cherry-picks.
          SORTED_SHAS=$(echo "$SELECTED_SHAS" | tr ' ' '\n' | grep -v '^$' | sort -u \
            | xargs -I{} git log -1 --format="%ct %H" {} \
            | sort -n | awk '{print $2}')

          echo "shas=$(echo "$SORTED_SHAS" | tr '\n' ' ' | xargs)" >> "$GITHUB_OUTPUT"
          {
            echo "feature_list<<EOF_FEATURES"
            echo -e "$FEATURE_LIST"
            echo "EOF_FEATURES"
          } >> "$GITHUB_OUTPUT"

      # ── Step 3: Build release branch from main ────────────────────────────

      - name: Delete stale release/staging branch if it exists
        run: |
          git push origin --delete release/staging 2>/dev/null || true

      - name: Create release/staging branch from main
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout -b release/staging origin/main

      - name: Cherry-pick release-ready merge commits
        id: cherry_pick
        env:
          SHAS: ${{ steps.collect.outputs.shas }}
        run: |
          set -euo pipefail
          for SHA in $SHAS; do
            echo "Cherry-picking $SHA"
            # -m 1 uses the first parent (main-line) diff for merge commits.
            if git cherry-pick -m 1 "$SHA"; then
              echo "  Successfully cherry-picked $SHA"
            else
              echo "  Conflict detected for $SHA — handing off to Claude."

              # Collect the SHAs that come AFTER the conflicting one.
              FOUND=false
              REMAINING=""
              for S in $SHAS; do
                if [ "$FOUND" = true ]; then
                  REMAINING="$REMAINING$S "
                fi
                [ "$S" = "$SHA" ] && FOUND=true
              done
              printf '%s\n' $REMAINING > /tmp/remaining-shas.txt

              echo "conflict=true" >> "$GITHUB_OUTPUT"
              exit 0  # Leave conflicted state in place; Claude handles it next.
            fi
          done
          echo "conflict=false" >> "$GITHUB_OUTPUT"

      - name: Resolve cherry-pick conflicts with Claude
        if: steps.cherry_pick.outputs.conflict == 'true'
        uses: anthropics/claude-code-action@aee99972d0cfa0c47a4563e6fca42d7a5a0cb9bd  # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            During the Build Release Branch workflow, a `git cherry-pick -m 1` has left
            the repository in a conflicted state.

            Your task is to resolve all conflicts and complete every remaining cherry-pick:

            1. Run `git status` to confirm the current state.
            2. Run `git diff --name-only --diff-filter=U` to list conflicted files.
            3. For each conflicted file:
               - Read the full file content.
               - Resolve all conflict markers (`<<<<<<<`, `=======`, `>>>>>>>`).
                 Keep the best combined content; for semantic conflicts prefer the
                 cherry-picked (incoming / THEIRS) changes, as those are the
                 intentional new changes being applied.
               - Write the resolved content back to the file.
               - Run `git add <file>`.
            4. Run `git cherry-pick --continue --no-edit` to complete the current cherry-pick.
            5. Read `/tmp/remaining-shas.txt`. For each SHA listed (one per line, file may be empty):
               a. Run `git cherry-pick -m 1 <SHA>`.
               b. If it succeeds, continue to the next SHA.
               c. If it fails with conflicts, repeat steps 2–4 for those conflicts,
                  then run `git cherry-pick --continue --no-edit`.
            6. When ALL cherry-picks are done successfully, write the single word
               `completed` to `/tmp/cherry-pick-status.txt`.
            7. If you cannot resolve a conflict (binary file, irreconcilable semantic
               conflict), write `failed: <brief reason>` to `/tmp/cherry-pick-status.txt`
               and stop immediately — do not modify further files.

            Do not create commits manually — `git cherry-pick --continue` handles that.
            Do not modify any files other than the conflicted source files.

      - name: Check conflict resolution status
        if: steps.cherry_pick.outputs.conflict == 'true'
        run: |
          STATUS=$(cat /tmp/cherry-pick-status.txt 2>/dev/null || echo "failed: Claude did not write a status")
          echo "Resolution status: $STATUS"
          if [ "$STATUS" != "completed" ]; then
            echo "::error::Cherry-pick conflict resolution failed — $STATUS"
            exit 1
          fi

      # ── Step 4: Determine version with semantic-release (dry-run) ─────────

      - name: Determine next version
        id: version
        run: |
          set -euo pipefail

          npx semantic-release --dry-run --no-ci 2>&1 | tee /tmp/sr-output.txt || true

          VERSION=$(grep -oP 'The next release version is \K[^\s]+' /tmp/sr-output.txt | head -1 || true)

          if [ -z "$VERSION" ]; then
            echo "::error::semantic-release could not determine a next version. Ensure the cherry-picked commits follow Conventional Commits (feat:, fix:, etc.)."
            cat /tmp/sr-output.txt
            exit 1
          fi

          echo "Next version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # ── Step 5: Update version files ──────────────────────────────────────

      - name: Update version in wp-ai-mind.php
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Plugin header — "Version:           X.Y.Z"
          sed -i "s/^\( \* Version:\s*\).*/\1${VERSION}/" wp-ai-mind.php
          # Version constant — define( 'WP_AI_MIND_VERSION', 'X.Y.Z' );
          sed -i "s/define( 'WP_AI_MIND_VERSION', '[^']*' );/define( 'WP_AI_MIND_VERSION', '${VERSION}' );/" wp-ai-mind.php

      - name: Update Stable tag in readme.txt
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -i "s/^Stable tag: .*/Stable tag: ${VERSION}/" readme.txt

      - name: Update version in package.json
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          npm version "$VERSION" --no-git-tag-version

      # ── Step 6: Update CHANGELOG.md ───────────────────────────────────────

      - name: Update CHANGELOG.md
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)

          # Find the last vX.Y.Z tag to bound the log range.
          LAST_TAG=$(git describe --tags --abbrev=0 --match "v*" origin/main 2>/dev/null || true)

          if [ -n "$LAST_TAG" ]; then
            RAW_LOG=$(git log "${LAST_TAG}..HEAD" --pretty="format:- %s" | grep -v "^- Merge " || true)
          else
            RAW_LOG=$(git log --pretty="format:- %s" | grep -v "^- Merge " | head -100 || true)
          fi

          # Write the new entry to a temp file (printf %b expands \n properly).
          ENTRY_FILE=$(mktemp)
          printf "## [%s] — %s\n\n%s\n\n" "${VERSION}" "${DATE}" "${RAW_LOG}" > "${ENTRY_FILE}"

          # Prepend: cat entry + existing CHANGELOG into a temp, then replace.
          CHANGELOG_TMP=$(mktemp)
          if [ -f CHANGELOG.md ]; then
            cat "${ENTRY_FILE}" CHANGELOG.md > "${CHANGELOG_TMP}"
          else
            cp "${ENTRY_FILE}" "${CHANGELOG_TMP}"
          fi
          mv "${CHANGELOG_TMP}" CHANGELOG.md
          rm -f "${ENTRY_FILE}"

      # ── Step 7: Commit, rename branch, and push ───────────────────────────

      - name: Commit version bump
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git add wp-ai-mind.php readme.txt package.json package-lock.json CHANGELOG.md
          git commit -m "chore: release v${VERSION}"

      - name: Rename branch to release/vX.Y.Z and push
        id: push
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          BRANCH="release/v${VERSION}"
          git branch -m "release/v${VERSION}"
          git push -u origin "${BRANCH}"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

      # ── Step 8: Open PR to main ────────────────────────────────────────────

      - name: Open release PR to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          BRANCH: ${{ steps.push.outputs.branch }}
          FEATURES: ${{ steps.collect.outputs.feature_list }}
        run: |
          gh pr create \
            --title "chore: release v${VERSION}" \
            --base main \
            --head "${BRANCH}" \
            --body "$(cat <<EOF
          ## Release v${VERSION}

          ### Features included
          ${FEATURES}

          ### What happens when this PR merges
          1. \`tag-release-merge.yml\` automatically creates the \`v${VERSION}\` git tag
          2. \`release.yml\` triggers on that tag, builds the plugin zip, and publishes the GitHub Release

          ## Test plan
          - [ ] CI passes on this branch
          - [ ] Version is correct in \`wp-ai-mind.php\` (header + constant), \`readme.txt\`, \`package.json\`
          - [ ] CHANGELOG entry is accurate and dated correctly
          - [ ] No unintended files changed

          > Merge this PR to trigger the automated tag and release build.
          EOF
          )"
