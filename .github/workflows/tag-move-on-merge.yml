name: Move Semantic Tag on Merge

# Fires only when a PR targeting `develop` or `main` is closed (merged).
# Reads the semantic label already on the PR and moves the git tag to the
# merge commit SHA so `git checkout feat/<slug>` always resolves to the
# final merged state.
#
# Kept in a separate workflow from tag-infer.yml so that a "skipped" job
# never appears in open PR checks — each workflow only runs when its event
# is actually relevant.
#
# Required permissions: contents:write to force-update git tags.

on:
  pull_request:
    types: [closed]
    branches: [develop, main]

permissions:
  contents: write        # force-update git tags
  pull-requests: read    # read labels on the merged PR

jobs:

  move-tag-on-merge:
    name: Move tag to merge commit
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Read semantic label from merged PR
        id: read-label
        env:
          GH_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          LABEL=$(gh pr view "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --json labels \
            --jq '[.labels[].name | select(test("^(feat[!]?|fix|hotfix): "))] | first // ""')

          if [ -z "$LABEL" ]; then
            echo "No semantic label on PR #${PR_NUMBER} — skipping tag move."
            exit 0
          fi

          # feat: oauth → feat/oauth  |  feat!: x → feat!/x
          TAG=$(echo "$LABEL" | sed 's|: |/|')
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"

      - name: Force-move tag to merge commit SHA
        if: steps.read-label.outputs.tag != ''
        env:
          TAG:       ${{ steps.read-label.outputs.tag }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --tags

          git push origin ":refs/tags/${TAG}" 2>/dev/null || true
          git tag -d "${TAG}" 2>/dev/null || true
          git tag -a "${TAG}" "${MERGE_SHA}" \
            -m "PR #${PR_NUMBER}: ${TAG} (merged)"
          git push origin "refs/tags/${TAG}"
          echo "Tag '${TAG}' → merge commit ${MERGE_SHA}"
