name: Release

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 5'   # every Friday at 10:00 UTC

# Prevent concurrent releases (e.g. two fast merges)
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Semantic release
    runs-on: ubuntu-latest
    # Skip the version-bump commit that semantic-release itself pushes back.
    # Without this guard the workflow would trigger itself in an infinite loop.
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    
    permissions:
      contents: write     # push tags + version-bump commit"
      issues: write       # create/comment on issues
      pull-requests: write  # comment on PRs

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0          # full history so semantic-release can read all tags
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: npm

      - uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: '8.1'
          tools: composer:v2

      - name: Install JS dependencies
        run: npm ci

      - name: Install PHP dependencies (production only)
        run: composer install --no-dev --prefer-dist --no-interaction

      - name: Build assets
        run: npm run build

      - name: Reconcile orphaned version tags
        # semantic-release determines the last release by finding the highest
        # vX.Y.Z tag that is a git ancestor of HEAD. If the branch history ever
        # diverges from the tagged history (e.g. after a force-push), those tags
        # become unreachable from HEAD. semantic-release then falls back to an
        # older tag, re-computes the same next version, and fails when it tries
        # to create a tag that already exists — AFTER already pushing a release
        # commit to main. This step detects any such orphaned tags and moves
        # them to HEAD so semantic-release treats them as already released.
        run: |
          git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          moved=""
          for tag in $(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' | sort -V); do
            if ! git merge-base --is-ancestor "$tag" HEAD 2>/dev/null; then
              echo "Orphaned tag $tag is not on this branch — moving to HEAD"
              git tag -f "$tag" HEAD
              git push -f origin "refs/tags/$tag"
              moved="$moved $tag"
            fi
          done
          if [ -n "$moved" ]; then
            echo "::warning::Moved orphaned version tags to HEAD:$moved. Branch history likely diverged from tag history."
          fi
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Release
        run: npx semantic-release
        env:
          # GH_PAT required — GITHUB_TOKEN cannot push the version-bump commit to main
          # because the branch ruleset blocks direct pushes; GH_PAT has bypass access.
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

  deploy-worker:
    name: Deploy prod Worker
    runs-on: ubuntu-latest
    needs: release
    # No actor guard — release.yml fires on a schedule where github.actor is
    # 'github-actions[bot]'. The trigger surface is narrow enough (schedule +
    # write-access workflow_dispatch) that a guard would block legitimate scheduled runs.
    #
    # This job runs on every release.yml execution, including Friday cron runs where
    # semantic-release decides nothing warrants a new version. Idempotent Worker deploys
    # are harmless and act as a weekly sync to confirm prod matches main.
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: plume-proxy/package-lock.json

      - name: Install Worker dependencies
        run: npm ci --no-audit --no-fund
        working-directory: plume-proxy

      - name: Run tests
        run: npm test
        working-directory: plume-proxy

      - name: Deploy prod Worker
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: plume-proxy
          command: deploy --env="" # explicit empty string targets top-level env; omitting it triggers a warning when named envs exist
