name: Release

on:
  push:
    branches: [main]

# Prevent concurrent releases (e.g. two fast merges)
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Semantic release
    runs-on: ubuntu-latest
    # Skip the version-bump commit that semantic-release itself pushes back.
    # Without this guard the workflow would trigger itself in an infinite loop.
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    
    permissions:
      contents: write     # push tags + version-bump commit"
      issues: write       # create/comment on issues
      pull-requests: write  # comment on PRs

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0          # full history so semantic-release can read all tags
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      - name: Install JS dependencies
        run: npm ci

      - name: Install PHP dependencies (production only)
        run: composer install --no-dev --prefer-dist --no-interaction

      - name: Build assets
        run: npm run build

      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

