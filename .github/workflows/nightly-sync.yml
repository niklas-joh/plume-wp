name: Nightly Sync — main → develop

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Merge main into develop
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check if main has new commits
        id: diff
        run: |
          git fetch origin main
          AHEAD=$(git rev-list --count develop..origin/main)
          echo "ahead=$AHEAD" >> "$GITHUB_OUTPUT"

      - name: Nothing to sync
        if: steps.diff.outputs.ahead == '0'
        run: echo "develop is already up to date with main — nothing to do."

      - name: Attempt merge (dry-run)
        if: steps.diff.outputs.ahead != '0'
        id: merge
        run: |
          if git merge origin/main --no-edit -m "chore: nightly sync main → develop"; then
            echo "status=clean" >> "$GITHUB_OUTPUT"
          else
            git merge --abort
            echo "status=conflict" >> "$GITHUB_OUTPUT"
          fi

      - name: Push merged develop
        if: steps.merge.outputs.status == 'clean'
        run: git push origin develop

      - name: Open and close conflict PR
        if: steps.merge.outputs.status == 'conflict'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            // Avoid duplicate open PRs for the same sync conflict
            const { data: open } = await github.rest.pulls.list({
              owner, repo,
              state: 'open',
              head: `${owner}:main`,
              base: 'develop',
            });
            if (open.length > 0) {
              core.warning('A sync PR is already open — skipping creation.');
              return;
            }

            const { data: pr } = await github.rest.pulls.create({
              owner, repo,
              title: 'chore: nightly sync main → develop',
              head: 'main',
              base: 'develop',
              body: [
                '> **Automated nightly sync — created and closed by CI**',
                '',
                '## Merge conflicts detected',
                '',
                'The nightly sync workflow could not automatically merge `main` into',
                '`develop` due to conflicts. This PR has been closed automatically.',
                '',
                '**Action required:** resolve the conflicts manually and push to `develop`.',
              ].join('\n'),
            });

            await github.rest.pulls.update({
              owner, repo,
              pull_number: pr.number,
              state: 'closed',
            });

            core.setFailed(
              `Merge conflict detected. PR #${pr.number} created and closed. Manual resolution required.`
            );
