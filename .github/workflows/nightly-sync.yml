name: Nightly Sync — main → develop

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  sync:
    name: Merge main into develop
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check if main has new commits
        id: diff
        run: |
          git fetch origin main
          AHEAD=$(git rev-list --count develop..origin/main)
          echo "ahead=$AHEAD" >> "$GITHUB_OUTPUT"

      - name: Nothing to sync
        if: steps.diff.outputs.ahead == '0'
        run: echo "develop is already up to date with main — nothing to do."

      # ── Clean path ──────────────────────────────────────────────────────────

      - name: Attempt merge
        if: steps.diff.outputs.ahead != '0'
        id: merge
        run: |
          if git merge origin/main --no-edit -m "chore: nightly sync main → develop"; then
            echo "status=clean" >> "$GITHUB_OUTPUT"
          else
            echo "status=conflict" >> "$GITHUB_OUTPUT"
          fi

      - name: Push merged develop
        if: steps.merge.outputs.status == 'clean'
        run: git push origin develop

      # ── Conflict path — ask Claude to review and resolve ───────────────────

      - name: Resolve conflicts with Claude
        if: steps.merge.outputs.status == 'conflict'
        uses: anthropics/claude-code-action@aee99972d0cfa0c47a4563e6fca42d7a5a0cb9bd  # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            A nightly `git merge origin/main` into `develop` has just failed due to merge conflicts.

            Your task:
            1. Run `git diff --name-only --diff-filter=U` to identify the conflicted files.
            2. Read each conflicted file and assess whether each conflict is:
               - **Easy** (safe to auto-resolve): non-overlapping additions, version/counter bumps,
                 import-only additions, whitespace or comment differences, one-sided deletions.
               - **Complex** (needs human judgment): both sides changed the same logic differently,
                 structural or semantic incompatibilities, anything ambiguous.
            3a. If ALL conflicts are easy: edit each file to remove all conflict markers
                (`<<<<<<<`, `=======`, `>>>>>>>`), keeping the correct combined content.
                Then run `git add` on each resolved file.
                Finally, write the single word `resolved` to `/tmp/resolution-status.txt`.
            3b. If ANY conflict is complex: do NOT modify any files.
                Write the single word `complex` to `/tmp/resolution-status.txt`.

      - name: Complete merge and push (Claude resolved)
        if: steps.merge.outputs.status == 'conflict'
        id: complete
        run: |
          STATUS=$(cat /tmp/resolution-status.txt 2>/dev/null || echo "complex")
          echo "Resolution status: $STATUS"
          echo "resolved=$( [ "$STATUS" = "resolved" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" = "resolved" ]; then
            git commit --no-edit
            git push origin develop
          fi

      # ── Conflict path — too complex, close the PR ─────────────────────────

      - name: Create and close conflict PR
        if: steps.merge.outputs.status == 'conflict' && steps.complete.outputs.resolved == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            // Avoid duplicate open PRs for the same sync conflict
            const { data: open } = await github.rest.pulls.list({
              owner, repo, state: 'open',
              head: `${owner}:main`, base: 'develop',
            });
            if (open.length > 0) {
              core.warning('A sync PR is already open — skipping creation.');
              core.setFailed('Merge conflicts require manual resolution.');
              return;
            }

            const { data: pr } = await github.rest.pulls.create({
              owner, repo,
              title: 'chore: nightly sync main → develop',
              head: 'main',
              base: 'develop',
              body: [
                '> **Automated nightly sync — closed automatically by CI**',
                '',
                '## Merge conflicts require manual resolution',
                '',
                'Claude reviewed the conflicts and determined they are too complex to auto-resolve.',
                'This PR has been closed automatically.',
                '',
                '**Action required:** resolve the conflicts manually and merge `main` into `develop`.',
              ].join('\n'),
            });

            await github.rest.pulls.update({
              owner, repo,
              pull_number: pr.number,
              state: 'closed',
            });

            core.setFailed(
              `Conflicts too complex for auto-resolution. PR #${pr.number} created and closed.`
            );
