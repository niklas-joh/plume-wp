name: Infer Semantic Tag

# Fires on every PR event targeting `develop` (features/fixes) or `main` (hotfixes).
#
# infer-and-tag:
#   • Calls claude-haiku-4-5 to infer the best semantic tag for the PR.
#   • Creates/updates a GitHub label (feat: <slug>, feat!: <slug>, fix: <slug>,
#     hotfix: <slug>) and applies it to the PR.
#   • Force-updates the matching git tag (feat/<slug> etc.) to the PR head SHA.
#   • Posts a comment explaining the assignment and how to override.
#
# The merge-time tag move (closed + merged) is handled by tag-move-on-merge.yml
# to keep the two concerns separate and avoid a skipped job appearing in PR checks.
#
# Loop guard: when the bot applies a label, that fires a `labeled` event.
# The `if` condition skips it when actor == github-actions[bot] to
# prevent an infinite retrigger loop.
#
# Tag schema:
#   feat/<slug>   minor version bump — new feature targeting develop
#   feat!/<slug>  MAJOR version bump — breaking change targeting develop
#   fix/<slug>    patch version bump — bug fix targeting develop
#   hotfix/<slug> patch version bump — emergency fix targeting main directly
#
# Required secret: CLAUDE_CODE_OAUTH_TOKEN (same token used by all other Claude Code workflows)

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches: [develop, main]

permissions:
  contents: write        # create/force-update git tags
  pull-requests: write   # post PR comments, apply labels

jobs:

  infer-and-tag:
    name: Infer and apply semantic tag
    # Skip bot-triggered label events to prevent the loop:
    # bot applies label → labeled event → bot applies label...
    if: "!(github.event.action == 'labeled' && github.actor == 'github-actions[bot]')"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── Step 1: Gather PR context ─────────────────────────────────────────

      - name: Gather PR context
        id: context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          git fetch --tags

          COMMITS=$(gh pr view "$PR_NUMBER" \
            --json commits \
            --jq '[.commits[-15:][].messageHeadline] | join("\n")' \
            2>/dev/null || echo "")

          EXISTING_TAGS=$(git tag -l 'feat/*' 'feat!/*' 'fix/*' 'hotfix/*' 2>/dev/null \
            | head -20 | tr '\n' ' ' || true)

          EXISTING_PR_LABELS=$(gh pr view "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --json labels \
            --jq '[.labels[].name | select(test("^(feat[!]?|fix|hotfix): "))] | join(" ")' \
            2>/dev/null || echo "")

          {
            echo "commits<<EOF_COMMITS"
            echo "$COMMITS"
            echo "EOF_COMMITS"
          } >> "$GITHUB_OUTPUT"
          echo "existing_tags=$EXISTING_TAGS" >> "$GITHUB_OUTPUT"
          echo "existing_pr_labels=$EXISTING_PR_LABELS" >> "$GITHUB_OUTPUT"

      # ── Step 2: Install Claude Code CLI ──────────────────────────────────

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      # ── Step 3: Call Claude Code to infer semantic tag ────────────────────

      - name: Call Claude Code to infer semantic tag
        id: infer
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          PR_TITLE:       ${{ github.event.pull_request.title }}
          PR_BRANCH:      ${{ github.event.pull_request.head.ref }}
          PR_BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER:      ${{ github.event.pull_request.number }}
          COMMITS:           ${{ steps.context.outputs.commits }}
          EXISTING_TAGS:     ${{ steps.context.outputs.existing_tags }}
          EXISTING_PR_LABELS: ${{ steps.context.outputs.existing_pr_labels }}
        run: |
          set -euo pipefail

          # Tag inference is a nice-to-have — it must never block a PR.
          # Treat a missing token as "skip gracefully" rather than a hard failure.
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]; then
            echo "::warning::CLAUDE_CODE_OAUTH_TOKEN secret is not configured — skipping semantic tag inference."
            exit 0
          fi

          # Build the prompt in Python rather than a shell heredoc so that
          # special characters in PR titles and commit messages (quotes, backslashes,
          # newlines) can't break variable expansion or corrupt the prompt string.
          PROMPT=$(python3 - <<'PYEOF'
          import os
          tags_raw  = os.environ.get('EXISTING_TAGS', '').strip()
          tags      = [t for t in tags_raw.split() if t]
          pr_labels = os.environ.get('EXISTING_PR_LABELS', '').strip()
          commits   = os.environ.get('COMMITS', '').strip()
          base      = os.environ.get('PR_BASE_BRANCH', 'develop')
          title     = os.environ.get('PR_TITLE', '')
          branch    = os.environ.get('PR_BRANCH', '')
          print(
              "You are a semantic tagger for a WordPress plugin repository.\n\n"
              "Given this PR, choose the best semantic tag slug.\n\n"
              f"PR title: {title}\n"
              f"PR branch: {branch}\n"
              f"PR base branch: {base}\n"
              f"Recent commits:\n{commits or '(no commits yet)'}\n\n"
              "Semantic labels ALREADY ON THIS PR (highest priority — you MUST reuse this\n"
              "slug unless it is clearly wrong for the PR content):\n"
              + (pr_labels if pr_labels else "(none)") + "\n\n"
              "Existing semantic tags across all PRs (reuse if this PR clearly extends one):\n"
              + ('\n'.join(tags) if tags else '(none yet)') + "\n\n"
              "Rules:\n"
              "- Prefix options:\n"
              "    feat/      new feature (targets develop) — minor version bump\n"
              "    feat!/     breaking change (targets develop) — MAJOR version bump\n"
              "    fix/       bug fix (targets develop) — patch version bump\n"
              "    hotfix/    emergency fix targeting main — patch version bump\n"
              '  If PR base branch is "main", the prefix MUST be hotfix/\n'
              '  If the PR title or commits contain "!" or "BREAKING CHANGE", use feat!/\n'
              "- Slug: lowercase, hyphens only, max 4 words\n"
              "  Examples: feat/ai-chat, fix/api-key-validation, feat!/remove-legacy-api\n"
              "- If a semantic label is already on this PR, you MUST reuse its slug unless\n"
              "  the PR content makes that slug clearly incorrect\n"
              "- Reuse an existing tag slug if this PR clearly extends that work\n"
              "- Otherwise create a new descriptive slug\n"
              '- Respond with ONLY valid JSON, no markdown fences:\n'
              '  {"tag":"feat/example","action":"reuse","reasoning":"one sentence"}\n'
              '  where action is "reuse" or "create"'
          )
          PYEOF
          )

          # Send the prompt to Claude and capture the raw text.
          RESPONSE=$(printf '%s' "$PROMPT" \
            | claude --print --model claude-haiku-4-5-20251001)

          # Extract tag/action/reasoning from Claude's response.
          #
          # Claude is instructed to return bare JSON, but LLM output is non-deterministic:
          # it may wrap the object in ```json fences or prefix it with a sentence.
          # A three-tier extraction strategy makes us resilient to all observed formats
          # without having to re-prompt or retry, which would slow down every PR event.
          #
          # The response is passed via env var rather than stdin because the heredoc
          # already occupies stdin to supply the Python script source to `python3 -`.
          #
          # On any parse failure we exit 0 (not 1) and emit a ::warning:: with the raw
          # Claude output, so maintainers can diagnose the exact response without the
          # workflow blocking the PR.
          PARSED=$(CLAUDE_RESPONSE="$RESPONSE" python3 - <<'PYEOF'
          import json, os, re, sys

          raw  = os.environ.get('CLAUDE_RESPONSE', '')
          text = raw.strip()
          parsed = None

          # Tier 1: trust the model — fast path for well-formed responses.
          try:
              parsed = json.loads(text)
          except json.JSONDecodeError:
              pass

          # Tier 2: Claude sometimes wraps the JSON in ```json … ``` fences despite
          # being instructed not to. Strip them and retry before falling back to regex.
          if parsed is None:
              stripped = re.sub(r'^\s*```[a-z]*\s*', '', text)
              stripped = re.sub(r'\s*```\s*$', '', stripped).strip()
              try:
                  parsed = json.loads(stripped)
              except json.JSONDecodeError:
                  pass

          # Tier 3: scan for the first {...} block containing "tag". This catches
          # responses that add a sentence of commentary before or after the JSON.
          if parsed is None:
              m = re.search(r'\{[^{}]*"tag"[^{}]*\}', text, re.DOTALL)
              if m:
                  try:
                      parsed = json.loads(m.group())
                  except json.JSONDecodeError:
                      pass

          if parsed is None:
              # Surface the raw Claude output so the next person debugging this
              # doesn't have to guess what the model actually returned.
              print(
                  f"::warning::Semantic tag inference: could not extract JSON "
                  f"from Claude's response. Raw output: {raw!r}",
                  file=sys.stderr,
              )
              sys.exit(0)

          try:
              print(parsed['tag'])
              print(parsed['action'])
              print(parsed.get('reasoning', ''))
          except KeyError as e:
              print(
                  f"::warning::Semantic tag inference: JSON is missing required "
                  f"field {e}. Parsed object: {parsed}",
                  file=sys.stderr,
              )
              sys.exit(0)
          PYEOF
          )

          TAG=$(printf '%s' "$PARSED"       | sed -n '1p')
          ACTION=$(printf '%s' "$PARSED"    | sed -n '2p')
          REASONING=$(printf '%s' "$PARSED" | sed -n '3p')

          # Validate: must match feat/, feat!/, fix/, or hotfix/ + slug
          if ! echo "$TAG" | grep -qP '^(feat[!]?|fix|hotfix)/[a-z0-9][a-z0-9-]*$'; then
            echo "::warning::Inferred tag '${TAG}' has invalid format — skipping tagging."
            exit 0
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "action=$ACTION" >> "$GITHUB_OUTPUT"
          {
            echo "reasoning<<EOF_REASONING"
            echo "$REASONING"
            echo "EOF_REASONING"
          } >> "$GITHUB_OUTPUT"

      # ── Step 4: Derive label name and colour ──────────────────────────────

      - name: Derive label name and colour
        id: label
        env:
          TAG: ${{ steps.infer.outputs.tag }}
        run: |
          set -euo pipefail
          [ -z "$TAG" ] && exit 0

          # feat/oauth → feat: oauth  |  feat!/x → feat!: x  |  hotfix/y → hotfix: y
          LABEL_NAME=$(echo "$TAG" | sed 's|/|: |')

          case "$TAG" in
            feat!/*)  COLOR="b60205" ;;   # red   — breaking/major
            feat/*)   COLOR="0075ca" ;;   # blue  — feature
            fix/*)    COLOR="e4e669" ;;   # yellow — fix
            hotfix/*) COLOR="ff6b35" ;;   # orange — hotfix
            *)        COLOR="cccccc" ;;
          esac

          echo "name=$LABEL_NAME"   >> "$GITHUB_OUTPUT"
          echo "color=$COLOR"       >> "$GITHUB_OUTPUT"

      # ── Step 5: Ensure label exists (idempotent) ──────────────────────────

      - name: Ensure label exists
        if: steps.infer.outputs.tag != ''
        env:
          GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          LABEL_NAME:   ${{ steps.label.outputs.name }}
          LABEL_COLOR:  ${{ steps.label.outputs.color }}
          TAG:          ${{ steps.infer.outputs.tag }}
        run: |
          gh label create "$LABEL_NAME" \
            --color "$LABEL_COLOR" \
            --description "Semantic group: $TAG" \
            --repo "${{ github.repository }}" 2>/dev/null || true

      # ── Step 6: Apply label to PR ─────────────────────────────────────────

      - name: Apply label to PR
        if: steps.infer.outputs.tag != ''
        env:
          GH_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER:  ${{ github.event.pull_request.number }}
          LABEL_NAME: ${{ steps.label.outputs.name }}
        run: |
          # Remove any stale semantic labels before applying the new one so that
          # labels never accumulate across reruns. Idempotent: if the label is
          # unchanged the loop body is skipped entirely.
          EXISTING_SEMANTIC=$(gh pr view "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --json labels \
            --jq '[.labels[].name | select(test("^(feat[!]?|fix|hotfix): "))] | .[]' \
            2>/dev/null || echo "")

          while IFS= read -r OLD_LABEL; do
            if [ -n "$OLD_LABEL" ] && [ "$OLD_LABEL" != "$LABEL_NAME" ]; then
              gh pr edit "$PR_NUMBER" \
                --remove-label "$OLD_LABEL" \
                --repo "${{ github.repository }}" 2>/dev/null || true
            fi
          done <<< "$EXISTING_SEMANTIC"

          gh pr edit "$PR_NUMBER" \
            --add-label "$LABEL_NAME" \
            --repo "${{ github.repository }}"

      # ── Step 7: Force-update git tag at PR head SHA ───────────────────────

      - name: Force-update git tag
        if: steps.infer.outputs.tag != ''
        env:
          TAG:       ${{ steps.infer.outputs.tag }}
          SHA:       ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git push origin ":refs/tags/${TAG}" 2>/dev/null || true
          git tag -d "${TAG}" 2>/dev/null || true
          git tag -a "${TAG}" "${SHA}" -m "PR #${PR_NUMBER}: ${TAG}"
          git push origin "refs/tags/${TAG}"
          echo "Tag '${TAG}' → ${SHA}"

      # ── Step 8: Post PR comment ───────────────────────────────────────────

      - name: Post PR comment
        if: steps.infer.outputs.tag != ''
        env:
          GH_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER:  ${{ github.event.pull_request.number }}
          TAG:        ${{ steps.infer.outputs.tag }}
          ACTION:     ${{ steps.infer.outputs.action }}
          REASONING:  ${{ steps.infer.outputs.reasoning }}
          LABEL_NAME: ${{ steps.label.outputs.name }}
        run: |
          if [ "$ACTION" = "reuse" ]; then
            ACTION_TEXT="reused existing tag (this PR extends \`${TAG}\`)"
          else
            ACTION_TEXT="created new slug"
          fi

          # Write body to a temp file to avoid unindented lines in the YAML block.
          {
            echo "## Semantic tag assigned: \`${TAG}\`"
            echo ""
            echo "**Action:** ${ACTION_TEXT}"
            echo "**Reasoning:** ${REASONING}"
            echo ""
            echo "To override: edit the \`${LABEL_NAME}\` label on this PR. Changing the label will retrigger this workflow and update the git tag automatically."
          } > /tmp/pr_comment_body.txt

          gh pr comment "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/pr_comment_body.txt

