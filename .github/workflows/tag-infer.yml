name: Infer Semantic Tag

# Fires on every PR event targeting `develop` (features/fixes) or `main` (hotfixes).
#
# Job 1 — infer-and-tag (all events except closed):
#   • Calls claude-haiku-4-5 to infer the best semantic tag for the PR.
#   • Creates/updates a GitHub label (feat: <slug>, feat!: <slug>, fix: <slug>,
#     hotfix: <slug>) and applies it to the PR.
#   • Force-updates the matching git tag (feat/<slug> etc.) to the PR head SHA.
#   • Posts a comment explaining the assignment and how to override.
#
# Job 2 — move-tag-on-merge (closed + merged):
#   • Reads the semantic label already on the PR and moves the git tag to the
#     merge commit SHA so `git checkout feat/<slug>` always resolves to the
#     final merged state.
#
# Loop guard: when the bot applies a label, that fires a `labeled` event.
# The `if` condition on job 1 skips it when actor == github-actions[bot] to
# prevent an infinite retrigger loop.
#
# Tag schema:
#   feat/<slug>   minor version bump — new feature targeting develop
#   feat!/<slug>  MAJOR version bump — breaking change targeting develop
#   fix/<slug>    patch version bump — bug fix targeting develop
#   hotfix/<slug> patch version bump — emergency fix targeting main directly
#
# Required secret: ANTHROPIC_API_KEY (used by Claude Code CLI for authentication)

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, closed]
    branches: [develop, main]

permissions:
  contents: write        # create/force-update git tags
  pull-requests: write   # post PR comments, apply labels

jobs:

  # --------------------------------------------------------------------------
  # Job 1: Infer slug, apply label, update git tag
  # --------------------------------------------------------------------------
  infer-and-tag:
    name: Infer and apply semantic tag
    # Skip on close (handled by job 2) and skip bot-triggered label events
    # to prevent the loop: bot applies label → labeled event → bot applies label...
    if: github.event.action != 'closed' && !(github.event.action == 'labeled' && github.actor == 'github-actions[bot]')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── Step 1: Gather PR context ─────────────────────────────────────────

      - name: Gather PR context
        id: context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          git fetch --tags

          COMMITS=$(gh pr view "$PR_NUMBER" \
            --json commits \
            --jq '[.commits[-15:][].messageHeadline] | join("\n")' \
            2>/dev/null || echo "")

          EXISTING_TAGS=$(git tag -l 'feat/*' 'feat!/*' 'fix/*' 'hotfix/*' 2>/dev/null \
            | head -20 | tr '\n' ' ' || true)

          {
            echo "commits<<EOF_COMMITS"
            echo "$COMMITS"
            echo "EOF_COMMITS"
          } >> "$GITHUB_OUTPUT"
          echo "existing_tags=$EXISTING_TAGS" >> "$GITHUB_OUTPUT"

      # ── Step 2: Install Claude Code CLI ──────────────────────────────────

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      # ── Step 3: Call Claude Code to infer semantic tag ────────────────────

      - name: Call Claude Code to infer semantic tag
        id: infer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_TITLE:       ${{ github.event.pull_request.title }}
          PR_BRANCH:      ${{ github.event.pull_request.head.ref }}
          PR_BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER:      ${{ github.event.pull_request.number }}
          COMMITS:        ${{ steps.context.outputs.commits }}
          EXISTING_TAGS:  ${{ steps.context.outputs.existing_tags }}
        run: |
          set -euo pipefail

          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "::warning::ANTHROPIC_API_KEY secret is not configured — skipping semantic tag inference."
            exit 0
          fi

          # Build the prompt text via helper script (avoids inline Python in YAML).
          PROMPT=$(python3 .github/scripts/build_infer_prompt.py)

          RESPONSE=$(printf '%s' "$PROMPT" \
            | claude --print --model claude-haiku-4-5-20251001)

          # Parse tag, action, reasoning from the response (one value per line).
          PARSED=$(echo "$RESPONSE" | python3 .github/scripts/parse_infer_response.py)
          TAG=$(echo "$PARSED"      | sed -n '1p')
          ACTION=$(echo "$PARSED"   | sed -n '2p')
          REASONING=$(echo "$PARSED" | sed -n '3p')

          # Validate: must match feat/, feat!/, fix/, or hotfix/ + slug
          if ! echo "$TAG" | grep -qP '^(feat[!]?|fix|hotfix)/[a-z0-9][a-z0-9-]*$'; then
            echo "::warning::Inferred tag '${TAG}' has invalid format — skipping tagging."
            exit 0
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "action=$ACTION" >> "$GITHUB_OUTPUT"
          {
            echo "reasoning<<EOF_REASONING"
            echo "$REASONING"
            echo "EOF_REASONING"
          } >> "$GITHUB_OUTPUT"

      # ── Step 4: Derive label name and colour ──────────────────────────────

      - name: Derive label name and colour
        id: label
        env:
          TAG: ${{ steps.infer.outputs.tag }}
        run: |
          set -euo pipefail
          [ -z "$TAG" ] && exit 0

          # feat/oauth → feat: oauth  |  feat!/x → feat!: x  |  hotfix/y → hotfix: y
          LABEL_NAME=$(echo "$TAG" | sed 's|/|: |')

          case "$TAG" in
            feat!/*)  COLOR="b60205" ;;   # red   — breaking/major
            feat/*)   COLOR="0075ca" ;;   # blue  — feature
            fix/*)    COLOR="e4e669" ;;   # yellow — fix
            hotfix/*) COLOR="ff6b35" ;;   # orange — hotfix
            *)        COLOR="cccccc" ;;
          esac

          echo "name=$LABEL_NAME"   >> "$GITHUB_OUTPUT"
          echo "color=$COLOR"       >> "$GITHUB_OUTPUT"

      # ── Step 5: Ensure label exists (idempotent) ──────────────────────────

      - name: Ensure label exists
        if: steps.infer.outputs.tag != ''
        env:
          GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          LABEL_NAME:   ${{ steps.label.outputs.name }}
          LABEL_COLOR:  ${{ steps.label.outputs.color }}
          TAG:          ${{ steps.infer.outputs.tag }}
        run: |
          gh label create "$LABEL_NAME" \
            --color "$LABEL_COLOR" \
            --description "Semantic group: $TAG" \
            --repo "${{ github.repository }}" 2>/dev/null || true

      # ── Step 6: Apply label to PR ─────────────────────────────────────────

      - name: Apply label to PR
        if: steps.infer.outputs.tag != ''
        env:
          GH_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER:  ${{ github.event.pull_request.number }}
          LABEL_NAME: ${{ steps.label.outputs.name }}
        run: |
          gh pr edit "$PR_NUMBER" \
            --add-label "$LABEL_NAME" \
            --repo "${{ github.repository }}"

      # ── Step 7: Force-update git tag at PR head SHA ───────────────────────

      - name: Force-update git tag
        if: steps.infer.outputs.tag != ''
        env:
          TAG:       ${{ steps.infer.outputs.tag }}
          SHA:       ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git push origin ":refs/tags/${TAG}" 2>/dev/null || true
          git tag -a "${TAG}" "${SHA}" -m "PR #${PR_NUMBER}: ${TAG}"
          git push origin "refs/tags/${TAG}"
          echo "Tag '${TAG}' → ${SHA}"

      # ── Step 8: Post PR comment ───────────────────────────────────────────

      - name: Post PR comment
        if: steps.infer.outputs.tag != ''
        env:
          GH_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER:  ${{ github.event.pull_request.number }}
          TAG:        ${{ steps.infer.outputs.tag }}
          ACTION:     ${{ steps.infer.outputs.action }}
          REASONING:  ${{ steps.infer.outputs.reasoning }}
          LABEL_NAME: ${{ steps.label.outputs.name }}
        run: |
          if [ "$ACTION" = "reuse" ]; then
            ACTION_TEXT="reused existing tag (this PR extends \`${TAG}\`)"
          else
            ACTION_TEXT="created new slug"
          fi

          # Write body to a temp file to avoid unindented lines in the YAML block.
          {
            echo "## Semantic tag assigned: \`${TAG}\`"
            echo ""
            echo "**Action:** ${ACTION_TEXT}"
            echo "**Reasoning:** ${REASONING}"
            echo ""
            echo "To override: edit the \`${LABEL_NAME}\` label on this PR. Changing the label will retrigger this workflow and update the git tag automatically."
          } > /tmp/pr_comment_body.txt

          gh pr comment "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/pr_comment_body.txt

  # --------------------------------------------------------------------------
  # Job 2: Move the tag to the merge commit once the PR merges
  # --------------------------------------------------------------------------
  move-tag-on-merge:
    name: Move tag to merge commit
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Read semantic label from merged PR
        id: read-label
        env:
          GH_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          LABEL=$(gh pr view "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --json labels \
            --jq '[.labels[].name | select(test("^(feat[!]?|fix|hotfix): "))] | first // ""')

          if [ -z "$LABEL" ]; then
            echo "No semantic label on PR #${PR_NUMBER} — skipping tag move."
            exit 0
          fi

          # feat: oauth → feat/oauth  |  feat!: x → feat!/x
          TAG=$(echo "$LABEL" | sed 's|: |/|')
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"

      - name: Force-move tag to merge commit SHA
        if: steps.read-label.outputs.tag != ''
        env:
          TAG:       ${{ steps.read-label.outputs.tag }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --tags

          git push origin ":refs/tags/${TAG}" 2>/dev/null || true
          git tag -a "${TAG}" "${MERGE_SHA}" \
            -m "PR #${PR_NUMBER}: ${TAG} (merged)"
          git push origin "refs/tags/${TAG}"
          echo "Tag '${TAG}' → merge commit ${MERGE_SHA}"
