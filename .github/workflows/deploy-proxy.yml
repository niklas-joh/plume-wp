# Deploys the Cloudflare Worker in stilus-proxy/ on every push to main
# that touches Worker source. Uses cloudflare/wrangler-action@v3 with a
# CLOUDFLARE_API_TOKEN secret — no personal machine or Tailscale dependency.
#
# Manual dispatch (workflow_dispatch) is available for re-deploys without a
# commit, e.g. to roll a Worker secret change.
name: Deploy proxy Worker

on:
  push:
    branches: [ main ]
    paths:
      - 'stilus-proxy/src/**'
      - 'stilus-proxy/wrangler.toml'
      - 'stilus-proxy/package.json'
      - 'stilus-proxy/package-lock.json'
      - '.github/workflows/deploy-proxy.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: wrangler deploy
    runs-on: ubuntu-latest
    concurrency:
      group: worker-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20.12'
          cache: npm
          cache-dependency-path: stilus-proxy/package-lock.json

      - name: Install dependencies
        # npm ci silently skips optional native bindings when the lockfile was
        # generated on a different platform (npm/cli#4828); npm install resolves them.
        run: npm install --no-audit --no-fund
        working-directory: stilus-proxy

      - name: Run tests
        run: npm test
        working-directory: stilus-proxy

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: stilus-proxy
