name: PR Quality Checks

on:
  pull_request:
    branches:
      - main
    types: [opened, reopened, ready_for_review]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'CHANGELOG.md'
      - 'RELEASING.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Detect which files changed ─────────────────────────────────────────────
  changes:
    name: Detect file changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      php: ${{ steps.filter.outputs.php }}
      js: ${{ steps.filter.outputs.js }}
      e2e: ${{ steps.filter.outputs.e2e }}
      proxy: ${{ steps.filter.outputs.proxy }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            php:
              - '**.php'
              - 'composer.json'
              - 'composer.lock'
              - 'phpcs.xml.dist'
              - 'phpstan.neon'
            js:
              - 'src/**'
              - 'package.json'
              - 'package-lock.json'
              - 'webpack.config.js'
            e2e:
              - 'src/**'
              - 'tests/E2E/**'
              - 'includes/**'
              - 'package.json'
              - 'playwright.config.*'
            proxy:
              - 'plume-proxy/**'

  # ── Cloud: PHPStan ──────────────────────────────────────────────────────────
  phpstan:
    name: PHPStan — Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.php == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - name: Cache Composer deps
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --error-format=github --memory-limit=1G

  # ── Cloud: PHP Compatibility Matrix ────────────────────────────────────────
  php-compat:
    name: PHP Compat — ${{ matrix.php }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.php == 'true'
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Cache Composer deps
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run PHP Compatibility
        run: |
          ./vendor/bin/phpcs \
            --standard=PHPCompatibilityWP \
            --runtime-set testVersion ${{ matrix.php }} \
            --extensions=php \
            --ignore=*/vendor/*,*/node_modules/*,*/tests/* \
            .

  # ── Cloud: Security Audit ──────────────────────────────────────────────────
  security:
    name: Security — Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Composer security audit
        run: composer audit --locked

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'

      - name: npm security audit (plugin)
        run: npm audit --omit=dev --audit-level=high

      - name: npm security audit (plume-proxy)
        working-directory: plume-proxy
        run: npm audit --omit=dev --audit-level=high

  # ── Cloud: Semgrep Security Scan ───────────────────────────────────────────
  # Static analysis with PHP, generic security, and OWASP Top 10 rule packs.
  # Fails on ERROR-severity findings; uploads SARIF for the GitHub Security tab.
  semgrep:
    name: Semgrep — Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install Semgrep
        run: pip install --upgrade semgrep

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config=p/php \
            --config=p/security-audit \
            --config=p/owasp-top-ten \
            --severity=ERROR \
            --metrics=off \
            --error \
            --sarif --output=semgrep.sarif

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ── Cloud: WP Plugin Check ─────────────────────────────────────────────────
  # WordPress.org's official plugin auditor: catches namespace collisions,
  # prefixing violations, escaping/sanitisation issues, deprecated APIs, i18n
  # problems, and file-organisation issues. Excludes the plugin_repo category
  # since this plugin is not on WordPress.org.
  #
  # Audits the production zip layout produced by bin/build-wporg.sh — the same
  # allowlist used for releases — so dev-only files (docs/, src/, tests/, etc.)
  # never reach the auditor.
  plugin-check:
    name: WP Plugin Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: changes
    permissions:
      contents: read
      pull-requests: write  # for the action to post/update its PR comment
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund

      - name: Build production plugin payload (dist/plume/)
        run: bash bin/build-wporg.sh

      - name: Configure wp-env to load built plugin
        run: |
          cat > .wp-env.override.json << 'EOF'
          {
            "plugins": ["./dist/plume"],
            "config": { "WP_DEBUG": false, "SCRIPT_DEBUG": false }
          }
          EOF

      - name: Start wp-env
        run: npx wp-env start

      - name: Install plugin-check into wp-env
        id: install-plugin-check
        run: npx wp-env run cli wp plugin install plugin-check --activate --allow-root --force

      - name: Run WP Plugin Check
        uses: WordPress/plugin-check-action@18573eb38f13543484a1f095672dae3849a4fbb0 # v1
        with:
          build-dir: 'dist/plume'
          # plugin_repo runs WP.org submission-readiness checks (readme.txt
          # format, headers, screenshots, etc.) — useful even before listing.
          categories: 'general,security,performance,accessibility,plugin_repo'
          include-experimental: true
          include-low-severity-errors: true
          include-low-severity-warnings: true
          ignore-warnings: true

      - name: Stop wp-env
        if: always()
        run: npx wp-env stop || true

      # Build the base ref (target branch) into a sibling dir so we can show
      # PR-vs-main deltas in the sticky comment. Failure here is non-fatal —
      # the comment falls back to totals-only when no baseline is available.
      - name: Checkout base ref for diff
        if: always() && github.event_name == 'pull_request'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.base_ref }}
          path: base-checkout
          fetch-depth: 1

      - name: Build base payload (for diff)
        if: always() && github.event_name == 'pull_request'
        id: base-build
        continue-on-error: true
        working-directory: base-checkout
        run: |
          npm ci --no-audit --no-fund
          bash bin/build-wporg.sh

      - name: Compute diagnostic metrics
        if: always()
        id: metrics
        # github.base_ref is user-controlled (PR target branch), so it must
        # be passed through env to avoid run-shell-injection (Semgrep
        # yaml.github-actions.security.run-shell-injection).
        env:
          PLUGIN_DIR: dist/plume
          BASE_DIR: base-checkout/dist/plume
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ ! -d "$PLUGIN_DIR" ]; then
            echo "build_present=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Helpers — count files / measure size for any payload dir.
          count_php_plugin() { find "$1" -name "*.php" -not -path "*/vendor/*" | wc -l | tr -d ' '; }
          count_php_vendor() { find "$1/vendor" -name "*.php" 2>/dev/null | wc -l | tr -d ' '; }
          count_js()         { find "$1" -name "*.js"  | wc -l | tr -d ' '; }
          count_css()        { find "$1" -name "*.css" | wc -l | tr -d ' '; }
          size_bytes()       { du -sb "$1" | awk '{print $1}'; }

          # Format an integer delta as "(+N)" / "(-N)" / "" — empty when zero
          # so unchanged rows stay visually quiet.
          fmt_int_delta() {
            if [ "$1" -gt 0 ]; then echo "(+$1)";
            elif [ "$1" -lt 0 ]; then echo "($1)";
            else echo ""; fi
          }
          # Format a byte delta as "(+1.2K)" / "(-512B)" / "".
          fmt_size_delta() {
            if [ "$1" -eq 0 ]; then echo ""; return; fi
            local sign abs
            if [ "$1" -gt 0 ]; then sign="+"; abs="$1"; else sign="-"; abs="$(( -$1 ))"; fi
            echo "(${sign}$(numfmt --to=iec --suffix=B "$abs"))"
          }

          PLUGIN_VERSION=$(grep "Version:" "$PLUGIN_DIR/plume.php" | head -1 | sed 's/.*Version:[[:space:]]*//' | tr -d '[:space:]')
          BUILD_SIZE=$(du -sh "$PLUGIN_DIR" | awk '{print $1}')
          PHP_COUNT=$(count_php_plugin "$PLUGIN_DIR")
          VENDOR_PHP=$(count_php_vendor "$PLUGIN_DIR")
          JS_COUNT=$(count_js "$PLUGIN_DIR")
          CSS_COUNT=$(count_css "$PLUGIN_DIR")

          BUILD_SIZE_DELTA=""
          PHP_DELTA=""
          VENDOR_PHP_DELTA=""
          JS_DELTA=""
          CSS_DELTA=""
          BASE_AVAILABLE="false"
          REPORTED_BASE_REF=""

          if [ -d "$BASE_DIR" ]; then
            BASE_AVAILABLE="true"
            REPORTED_BASE_REF="$BASE_REF"
            BUILD_SIZE_DELTA=$(fmt_size_delta "$(( $(size_bytes "$PLUGIN_DIR") - $(size_bytes "$BASE_DIR") ))")
            PHP_DELTA=$(fmt_int_delta        "$(( PHP_COUNT  - $(count_php_plugin "$BASE_DIR") ))")
            VENDOR_PHP_DELTA=$(fmt_int_delta "$(( VENDOR_PHP - $(count_php_vendor "$BASE_DIR") ))")
            JS_DELTA=$(fmt_int_delta         "$(( JS_COUNT   - $(count_js         "$BASE_DIR") ))")
            CSS_DELTA=$(fmt_int_delta        "$(( CSS_COUNT  - $(count_css        "$BASE_DIR") ))")
          fi

          {
            echo "build_present=true"
            echo "plugin_version=$PLUGIN_VERSION"
            echo "build_size=$BUILD_SIZE"
            echo "php_count=$PHP_COUNT"
            echo "vendor_php=$VENDOR_PHP"
            echo "js_count=$JS_COUNT"
            echo "css_count=$CSS_COUNT"
            echo "base_available=$BASE_AVAILABLE"
            echo "base_ref=$REPORTED_BASE_REF"
            echo "build_size_delta=$BUILD_SIZE_DELTA"
            echo "php_delta=$PHP_DELTA"
            echo "vendor_php_delta=$VENDOR_PHP_DELTA"
            echo "js_delta=$JS_DELTA"
            echo "css_delta=$CSS_DELTA"
          } >> "$GITHUB_OUTPUT"

      - name: Post diagnostic summary (sticky — updates in place)
        if: always() && steps.metrics.outputs.build_present == 'true'
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2
        with:
          header: plugin-check-diagnostics
          message: |
            ## 🔍 Plugin Check — Diagnostic Summary

            **Audited shipping payload** built by `bin/build-wporg.sh` → `dist/plume/`
            (matches the production zip uploaded to GitHub Releases.)

            | Metric | Value | Δ vs `${{ steps.metrics.outputs.base_ref || 'main' }}` |
            |---|---|---|
            | Plugin version | `${{ steps.metrics.outputs.plugin_version }}` | — |
            | Build size | ${{ steps.metrics.outputs.build_size }} | ${{ steps.metrics.outputs.build_size_delta || '—' }} |
            | PHP files (plugin) | ${{ steps.metrics.outputs.php_count }} | ${{ steps.metrics.outputs.php_delta || '—' }} |
            | PHP files (vendor) | ${{ steps.metrics.outputs.vendor_php }} | ${{ steps.metrics.outputs.vendor_php_delta || '—' }} |
            | JS files | ${{ steps.metrics.outputs.js_count }} | ${{ steps.metrics.outputs.js_delta || '—' }} |
            | CSS files | ${{ steps.metrics.outputs.css_count }} | ${{ steps.metrics.outputs.css_delta || '—' }} |

            ${{ steps.metrics.outputs.base_available == 'true' && '_Empty Δ cells mean unchanged. Baseline rebuilt from the target branch on each run._' || '_Baseline build for the target branch was unavailable, so deltas are not shown. Totals reflect the PR head only._' }}

            **Categories:** `general` · `security` · `performance` · `accessibility` · `plugin_repo`
            **Experimental checks:** enabled
            **Low-severity findings:** surfaced (errors + warnings)

            📦 [Full results artifact (`plugin-check-results.txt`)](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts) — download from the Actions run.

            <sub>Posted by the `plugin-check` job in `pr-checks.yml`. This comment updates in place on each push.</sub>

  # ── Cloud: Lighthouse Performance Budget ───────────────────────────────────
  # Front-end audit only (admin UI requires authenticated Lighthouse). Verifies
  # the production-shape plugin doesn't break or bloat the public-facing site.
  # Performance/SEO are warn-only; accessibility and asset-minification are
  # enforced as errors.
  #
  # Tests the SHIPPING payload (bin/build-wporg.sh -> dist/plume/) with
  # SCRIPT_DEBUG=false so the audit reflects what real users see, not the
  # development-mode unminified core scripts.
  lighthouse:
    name: Lighthouse — Performance Budget
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund

      - name: Build production plugin payload (dist/plume/)
        run: bash bin/build-wporg.sh

      - name: Override wp-env to load the built plugin in production mode
        run: |
          cat > .wp-env.override.json << 'EOF'
          {
            "plugins": ["./dist/plume"],
            "config": {
              "WP_DEBUG": false,
              "SCRIPT_DEBUG": false
            }
          }
          EOF

      - name: Start wp-env
        run: npx wp-env start

      - name: Wait for WordPress
        run: |
          for i in {1..30}; do
            if curl -fs http://localhost:8888 > /dev/null; then
              echo "WordPress is up"
              exit 0
            fi
            sleep 2
          done
          echo "::error::WordPress did not start within 60s"
          exit 1

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Stop wp-env
        if: always()
        run: npx wp-env stop || true

  # ── Cloud: E2E (Playwright via wp-env) ─────────────────────────────────────
  e2e:
    name: E2E — Playwright (wp-env on Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: changes
    if: needs.changes.outputs.e2e == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - name: Cache Composer deps
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      # The Playwright CDN download has been seen to stall indefinitely after
      # completing (PR #721 burnt the full 6-hour job limit). Caching the
      # browser binaries avoids the download entirely on most runs, and the
      # step-level timeout makes any remaining stall fail fast.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        timeout-minutes: 5
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS dependencies (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        timeout-minutes: 5
        run: npx playwright install-deps chromium

      - name: Start wp-env
        run: npx wp-env start

      - name: Wait for WordPress
        run: |
          for i in {1..30}; do
            if curl -fs http://localhost:8888 > /dev/null; then
              echo "WordPress is up"
              exit 0
            fi
            sleep 2
          done
          echo "::error::WordPress did not start within 60s"
          exit 1

      - name: Run Playwright tests
        env:
          WP_BASE_URL: http://localhost:8888
          # Test-only account created by global-setup.js inside the ephemeral wp-env container.
          # These credentials are already hardcoded in global-setup.js and p1-activation.spec.js.
          WP_TEST_USER: nj_agent
          WP_TEST_PASS: C8IcqAWJu8F3dOw6E4ndWhIe
          # Enables real-api-chat.spec.js — test is skipped when absent.
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: CI=true npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: .artifacts/playwright-report/
          retention-days: 7

      - name: Stop wp-env
        if: always()
        run: npx wp-env stop || true

  # ── Vitest: Full proxy unit test suite ────────────────────────────────────
  # Runs the complete plume-proxy test suite (auth, webhook, tierSync,
  # namespace-contract, etc.) on every plume-proxy/** change.
  vitest-proxy-unit:
    name: Vitest — Proxy unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.proxy == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: 'plume-proxy/.nvmrc'
          cache: 'npm'
          cache-dependency-path: plume-proxy/package-lock.json

      - name: Install proxy dependencies
        working-directory: plume-proxy
        run: npm ci --no-audit --no-fund

      - name: Run proxy unit tests
        working-directory: plume-proxy
        run: npm test

  # ── Cloud: Real Integration Tests (live API calls) ─────────────────────────
  # Makes live Anthropic API calls and real proxy requests.
  # Each test class skips (not fails) when the required secret is absent.
  # Tier-gating tests need no secrets — they run unconditionally.
  real-integration:
    name: Real Integration — live Anthropic API
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: changes
    if: needs.changes.outputs.php == 'true' || needs.changes.outputs.proxy == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Cache Composer deps
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Start wp-env
        run: npx wp-env start

      - name: Wait for WordPress test instance
        run: |
          for i in {1..30}; do
            if curl -fs http://localhost:8889 > /dev/null; then echo "Ready"; exit 0; fi
            sleep 2
          done
          echo "::error::WordPress test instance did not start within 60s"; exit 1

      - name: Patch WordPress test utils for PHPUnit 10 compatibility
        # @wordpress/env bundles /wordpress-phpunit/ which still calls
        # PHPUnit\Util\Test::parseTestMethodAnnotations() — removed in PHPUnit 10.
        # The script replaces the call with a safe empty-array no-op.
        run: |
          npx wp-env run tests-wordpress -- php \
            /var/www/html/wp-content/plugins/plume-ai/tests/phpunit10-compat.php

      - name: Run real integration tests
        # Secrets are expanded on the host by the GitHub Actions runner before
        # the string is passed to Docker — they never appear in CI logs.
        # 'wp-env run -- bash -c' bypasses wp-env's automatic CWD-setting, so
        # we cd to the plugin directory explicitly before running phpunit.
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          PLUME_CI_SITE_TOKEN: ${{ secrets.PLUME_CI_SITE_TOKEN }}
          PLUME_PROXY_URL: ${{ secrets.PLUME_PROXY_URL }}
        run: |
          npx wp-env run tests-wordpress -- bash -c "
            cd /var/www/html/wp-content/plugins/plume-ai
            CLAUDE_API_KEY='${CLAUDE_API_KEY}' \
            PLUME_CI_SITE_TOKEN='${PLUME_CI_SITE_TOKEN}' \
            PLUME_PROXY_URL='${PLUME_PROXY_URL}' \
            vendor/bin/phpunit \
              -c phpunit-real-integration.xml.dist \
              --colors=always
          "

      - name: Stop wp-env
        if: always()
        run: npx wp-env stop || true

  # ── Cloud: PHP Integration Tests (wp-env) ─────────────────────────────────
  # Runs tests/Integration/ against a real WordPress instance provided by
  # wp-env's tests-wordpress container, using phpunit-integration.xml.dist.
  integration:
    name: PHP Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [changes]
    if: needs.changes.outputs.php == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Cache Composer deps
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Start wp-env
        run: npx wp-env start

      - name: Wait for WordPress
        run: |
          for i in {1..30}; do
            if curl -fs http://localhost:8889 > /dev/null; then
              echo "WordPress is up"
              exit 0
            fi
            sleep 2
          done
          echo "::error::WordPress did not start within 60s"
          exit 1

      - name: Patch WordPress test utils for PHPUnit 10 compatibility
        # @wordpress/env bundles /wordpress-phpunit/ which still calls
        # PHPUnit\Util\Test::parseTestMethodAnnotations() — removed in PHPUnit 10.
        # The script replaces the call with a safe empty-array no-op.
        run: |
          npx wp-env run tests-wordpress -- php \
            /var/www/html/wp-content/plugins/plume-ai/tests/phpunit10-compat.php

      - name: Run integration tests
        run: |
          npx wp-env run tests-wordpress -- bash -c "
            cd /var/www/html/wp-content/plugins/plume-ai
            vendor/bin/phpunit \
              -c phpunit-integration.xml.dist \
              --colors=always
          "

      - name: Stop wp-env
        if: always()
        run: npx wp-env stop || true
