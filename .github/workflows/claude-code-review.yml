name: Claude Code Review

on:
  pull_request:
    types: [opened]
    paths-ignore:
      - "package-lock.json"
      - "composer.lock"
      - "yarn.lock"
      - "*.lock"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    continue-on-error: true  # review is informational; never block merges
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          fetch-depth: 1

      - name: Guard — skip if workflow files changed
        id: guard
        run: |
          count=$(gh api \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            --jq '[.[] | select(.filename | startswith(".github/workflows/"))] | length')
          if [[ "$count" -gt 0 ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Claude Code Review — this PR modifies workflow files. The claude-code-action security check would fail because the workflow on this branch differs from main."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run Claude Code Review
        if: steps.guard.outputs.skip != 'true'
        id: claude-review
        uses: anthropics/claude-code-action@aee99972d0cfa0c47a4563e6fca42d7a5a0cb9bd  # v1
        env:
          # Use a PAT for all gh calls inside Claude (issue/label creation).
          # Issue numbers are collected after this step and trigger batch auto-fix
          # via a single repository_dispatch event (not per-issue label webhooks).
          GH_TOKEN: ${{ secrets.GH_PAT }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            PR URL: ${{ github.event.pull_request.html_url }}
            BASE BRANCH: ${{ github.event.pull_request.base.ref }}

            Review this pull request against the repository's CLAUDE.md conventions. Be constructive and helpful.

            Cover the following areas. Tag each finding with its category (e.g. [DRY], [SRP], [Security]).

            **Correctness & safety**
            - Potential bugs, edge-cases, or logic errors
            - Security concerns (input sanitisation, escaping, capability checks, nonces)
            - Data-loss risks or irreversible side-effects

            **Design principles**
            - **[DRY]** — duplicated logic or data that should be extracted into a shared function/constant
            - **[SRP]** — classes or functions doing more than one job; hooks that mix unrelated concerns
            - **[KISS]** — unnecessary complexity, over-engineering, or abstractions with no current use-case
            - **[YAGNI]** — speculative code, flags, or extension points added "just in case"
            - **[Separation of concerns]** — presentation logic leaking into data/business layers (or vice versa)
            - **[Naming]** — misleading, ambiguous, or overly abbreviated identifiers

            **Code quality**
            - Dead code, commented-out blocks, or unreachable branches
            - Deeply nested conditionals or high cyclomatic complexity (suggest early returns)
            - Magic numbers/strings that should be named constants
            - Inconsistent style or deviations from project conventions (see CLAUDE.md)
            - **[Reuse]** — new functions, classes, or logic that duplicate or could extend something that already exists in the codebase (reinventing the wheel, missed extension points)

            **Performance**
            - Unnecessary database queries inside loops (N+1 patterns)
            - Missing caching opportunities for expensive operations
            - Autoloaded options that should be non-autoloaded

            **Test coverage**
            - Untested public methods or critical branches
            - Assertions that only test the happy path

            ### Step 0 — Ensure required labels exist

            Before creating any issues, make sure these labels exist (ignore errors if they already do):

              gh label create "code-review" --color "#0075ca" --description "Found during code review" --repo ${{ github.repository }} 2>/dev/null || true
              gh label create "blocking"    --color "#b60205" --description "Blocking issue"            --repo ${{ github.repository }} 2>/dev/null || true
              gh label create "enhancement" --color "#a2eeef" --description "Improvement or suggestion"  --repo ${{ github.repository }} 2>/dev/null || true
              gh label create "nits"        --color "#d4c5f9" --description "Style and minor nits"     --repo ${{ github.repository }} 2>/dev/null || true
              gh label create "auto-fix"    --color "#e4e669" --description "Claude will auto-fix this"  --repo ${{ github.repository }} 2>/dev/null || true

            ### Step 1 — Create issues for follow-up items (do this FIRST to capture URLs)

            For any finding that warrants independent follow-up, create a GitHub issue.

            Classify each finding:
            - **blocking** (bug, security flaw, data loss risk) → labels: `code-review,blocking`, auto-fixable → add to /tmp/auto-fix-issues.txt
            - **improvement** (non-trivial refactor, missing tests, performance) → labels: `code-review,enhancement`, auto-fixable → add to /tmp/auto-fix-issues.txt
            - **nits/style** → collect in memory, create ONE consolidated issue at the end with labels: `code-review,nits`, auto-fixable → add to /tmp/auto-fix-issues.txt

            Example command for a blocking issue (use this exact body format — the auto-fix
            workflow parses it to find the PR number and base branch):

              # Use $'...' quoting so \n is interpreted as real newlines by bash (double quotes do not expand \n).
              ISSUE_URL=$(gh issue create \
                --title "<concise title for the finding>" \
                --body $'Found during review of PR #${{ github.event.pull_request.number }}\n\n**PR:** ${{ github.event.pull_request.html_url }}\n**Base branch:** ${{ github.event.pull_request.base.ref }}\n\n## Description\n\n<details>\n\n## Context\n\n**File:** `path/to/file.php`, lines N–M\n\n```php\n// paste the relevant ≤25 lines here so the auto-fix session\n// can locate and edit the code without an extra file-read turn\n```' \
                --label "code-review,blocking" \
                --repo ${{ github.repository }})
              ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
              echo "$ISSUE_NUMBER" >> /tmp/auto-fix-issues.txt

            **Always include a `## Context` section** in every issue body (blocking, enhancement, and nits).
            Paste the exact lines from the source file that need changing (≤ 25 lines, fenced code block
            with the correct language identifier). This allows the auto-fix session to skip a file-read
            turn and go straight to editing.

            **For nits:** Collect all nit findings in a single structured list (e.g. in memory or temp file),
            then create ONE consolidated issue with all of them at the end of Step 1:

              NITS_ISSUE=$(gh issue create \
                --title "Review nits: style and minor improvements from PR #${{ github.event.pull_request.number }}" \
                --body $'Found during review of PR #${{ github.event.pull_request.number }}\n\n**PR:** ${{ github.event.pull_request.html_url }}\n**Base branch:** ${{ github.event.pull_request.base.ref }}\n\n## Nits to address\n\n- [nit 1]\n- [nit 2]\n- [nit 3]' \
                --label "code-review,nits" \
                --repo ${{ github.repository }})
              NITS_NUMBER=$(echo "$NITS_ISSUE" | grep -oE '[0-9]+$')
              echo "$NITS_NUMBER" >> /tmp/auto-fix-issues.txt

            Do NOT apply the `auto-fix` label yourself. A subsequent workflow step collects
            all issue numbers from /tmp/auto-fix-issues.txt and triggers a single batch
            auto-fix session via repository_dispatch — one Claude session fixes all issues
            instead of one session per issue. Only append an issue number to
            /tmp/auto-fix-issues.txt if the fix is **self-contained** — i.e. Claude can
            determine the correct fix purely from the codebase, without needing external
            values such as API keys, account IDs, variant IDs, secrets, or business
            decisions. Issues requiring such information must be fixed manually: create the
            issue but do NOT write its number to /tmp/auto-fix-issues.txt.

            Capture the URL returned by each `gh issue create` call.

            ### Step 2 — Post the review comment on the PR

            Post a single comment on the PR:

              gh pr comment ${{ github.event.pull_request.number }} \
                --body "<your full review>" \
                --repo ${{ github.repository }}

            Structure the comment as:
            1. **Summary** — 1–3 sentence overview of the PR
            2. **Findings** — grouped by severity (bugs → improvements → nits):
               - Each finding: `[Category] \`path/to/file.php\` — description (See #N for tracking.)`
               - **For nits:** Provide the **full verbose explanation** of each nit as you normally would.
                 Then, at the end of the nits section, add: "All nits are tracked in #N for auto-fix."
                 This keeps the detailed feedback visible in the PR while also referencing the consolidated issue.
            3. **Verdict** — Approved / Needs changes / Needs discussion

          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://docs.claude.com/en/docs/claude-code/sdk#command-line for available options
          claude_args: "--allowedTools Bash(gh:*),Read,Glob,Grep"

      - name: Collect auto-fix issue numbers
        id: collect
        if: steps.guard.outputs.skip != 'true'
        run: |
          if [[ ! -f /tmp/auto-fix-issues.txt ]]; then
            echo "No issues created — nothing to auto-fix."
            echo "issues=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Build a compact JSON array of integers, e.g. [274, 275]
          ISSUES=$(grep -v '^[[:space:]]*$' /tmp/auto-fix-issues.txt \
            | jq -R 'tonumber' | jq -s -c '.')
          echo "issues=${ISSUES}" >> "$GITHUB_OUTPUT"
          echo "Collected issues for batch auto-fix: ${ISSUES}"

      - name: Trigger batch auto-fix via repository_dispatch
        # Fire ONE event carrying all issue numbers — a single Claude session
        # fixes them all, saving (N-1) cold-start session costs per PR.
        if: |
          steps.guard.outputs.skip != 'true' &&
          steps.collect.outputs.issues != '[]' &&
          steps.collect.outputs.issues != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Use --input so issue_numbers is sent as a real JSON array, not a string.
          printf '%s' '{
            "event_type": "batch-auto-fix",
            "client_payload": {
              "issue_numbers": ${{ steps.collect.outputs.issues }},
              "pr_number": ${{ github.event.pull_request.number }},
              "pr_url": "${{ github.event.pull_request.html_url }}",
              "base_branch": "${{ github.event.pull_request.base.ref }}",
              "head_branch": "${{ github.event.pull_request.head.ref }}"
            }
          }' | gh api "repos/${{ github.repository }}/dispatches" --method POST --input -
          echo "Dispatched batch-auto-fix for issues: ${{ steps.collect.outputs.issues }}"
