name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'
    
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@aee99972d0cfa0c47a4563e6fca42d7a5a0cb9bd  # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            PR URL: ${{ github.event.pull_request.html_url }}
            BASE BRANCH: ${{ github.event.pull_request.base.ref }}

            Review this pull request against the repository's CLAUDE.md conventions. Be constructive and helpful.

            Cover:
            - Code quality and best practices
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage

            ### Step 1 — Create issues for follow-up items (do this FIRST to capture URLs)

            For any finding that warrants independent follow-up (bug, non-trivial improvement,
            security concern, missing test coverage), create a GitHub issue.

            Classify each finding:
            - **blocking** (bug, security flaw, data loss risk) → labels: `code-review,blocking,auto-fix`
            - **improvement** (non-trivial refactor, missing tests, performance) → labels: `code-review,enhancement`
            - **nit/style** → no issue, PR comment only

            Issue body MUST use this exact format so the auto-fix workflow can parse it:

            ```
            Found during review of PR #${{ github.event.pull_request.number }}

            **PR:** ${{ github.event.pull_request.html_url }}
            **Base branch:** ${{ github.event.pull_request.base.ref }}

            ## Description

            <detailed description of the finding and what needs to be fixed>
            ```

            Example command for a blocking issue:

              gh issue create \
                --title "<concise title for the finding>" \
                --body "Found during review of PR #${{ github.event.pull_request.number }}\n\n**PR:** ${{ github.event.pull_request.html_url }}\n**Base branch:** ${{ github.event.pull_request.base.ref }}\n\n## Description\n\n<details>" \
                --label "code-review,blocking,auto-fix" \
                --repo ${{ github.repository }}

            Capture the URL returned by each `gh issue create` call.

            ### Step 2 — Post the review comment on the PR

            Post a single comment on the PR:

              gh pr comment ${{ github.event.pull_request.number }} \
                --body "<your full review>" \
                --repo ${{ github.repository }}

            Structure the comment as:
            1. **Summary** — 1–3 sentence overview of the PR
            2. **Findings** — grouped by severity (bugs → improvements → nits). For any finding that
               has an associated issue, include the issue URL inline, e.g. "See #42 for tracking."
            3. **Verdict** — Approved / Needs changes / Needs discussion

          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://docs.claude.com/en/docs/claude-code/sdk#command-line for available options
          claude_args: '--allowed-tools "Bash(gh pr comment:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh issue create:*),Bash(gh issue list:*)"'

