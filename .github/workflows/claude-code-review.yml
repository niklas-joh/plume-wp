name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - "package-lock.json"
      - "composer.lock"
      - "yarn.lock"
      - "*.lock"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    continue-on-error: true  # review is informational; never block merges
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          fetch-depth: 1

      - name: Guard — skip if workflow files changed
        id: guard
        run: |
          count=$(gh api \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            --jq '[.[] | select(.filename | startswith(".github/workflows/"))] | length')
          if [[ "$count" -gt 0 ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Claude Code Review — this PR modifies workflow files. The claude-code-action security check would fail because the workflow on this branch differs from main."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run Claude Code Review
        if: steps.guard.outputs.skip != 'true'
        id: claude-review
        uses: anthropics/claude-code-action@aee99972d0cfa0c47a4563e6fca42d7a5a0cb9bd  # v1
        env:
          # Use a PAT for all gh calls inside Claude (issue/label creation).
          # The actual auto-fix label is applied in the dedicated step below,
          # which also uses this PAT to fire the issues:labeled webhook event.
          GH_TOKEN: ${{ secrets.GH_PAT }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            PR URL: ${{ github.event.pull_request.html_url }}
            BASE BRANCH: ${{ github.event.pull_request.base.ref }}

            Review this pull request against the repository's CLAUDE.md conventions. Be constructive and helpful.

            Cover:
            - Code quality and best practices
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage

            ### Step 0 — Ensure required labels exist

            Before creating any issues, make sure these labels exist (ignore errors if they already do):

              gh label create "code-review" --color "#0075ca" --description "Found during code review" --repo ${{ github.repository }} 2>/dev/null || true
              gh label create "blocking"    --color "#b60205" --description "Blocking issue"            --repo ${{ github.repository }} 2>/dev/null || true
              gh label create "enhancement" --color "#a2eeef" --description "Improvement or suggestion"  --repo ${{ github.repository }} 2>/dev/null || true
              gh label create "auto-fix"    --color "#e4e669" --description "Claude will auto-fix this"  --repo ${{ github.repository }} 2>/dev/null || true

            ### Step 1 — Create issues for follow-up items (do this FIRST to capture URLs)

            For any finding that warrants independent follow-up (bug, non-trivial improvement,
            security concern, missing test coverage), create a GitHub issue.

            Classify each finding:
            - **blocking** (bug, security flaw, data loss risk) → labels: `code-review,blocking`
            - **improvement** (non-trivial refactor, missing tests, performance) → labels: `code-review,enhancement`
            - **nit/style** → no issue, PR comment only

            Example command for a blocking issue (use this exact body format — the auto-fix
            workflow parses it to find the PR number and base branch):

              # Use $'...' quoting so \n is interpreted as real newlines by bash (double quotes do not expand \n).
              ISSUE_URL=$(gh issue create \
                --title "<concise title for the finding>" \
                --body $'Found during review of PR #${{ github.event.pull_request.number }}\n\n**PR:** ${{ github.event.pull_request.html_url }}\n**Base branch:** ${{ github.event.pull_request.base.ref }}\n\n## Description\n\n<details>' \
                --label "code-review,blocking" \
                --repo ${{ github.repository }})
              ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
              echo "$ISSUE_NUMBER" >> /tmp/auto-fix-issues.txt

            Do NOT apply the `auto-fix` label yourself. A subsequent workflow step applies
            it via a PAT outside this action, which guarantees the `issues: labeled` webhook
            fires correctly and triggers the auto-fix workflow. Just append each created
            issue number (one per line) to /tmp/auto-fix-issues.txt.

            Capture the URL returned by each `gh issue create` call.

            ### Step 2 — Post the review comment on the PR

            Post a single comment on the PR:

              gh pr comment ${{ github.event.pull_request.number }} \
                --body "<your full review>" \
                --repo ${{ github.repository }}

            Structure the comment as:
            1. **Summary** — 1–3 sentence overview of the PR
            2. **Findings** — grouped by severity (bugs → improvements → nits). For any finding that
               has an associated issue, include the issue URL inline, e.g. "See #42 for tracking."
            3. **Verdict** — Approved / Needs changes / Needs discussion

          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://docs.claude.com/en/docs/claude-code/sdk#command-line for available options
          claude_args: "--allowedTools Bash(gh:*),Read,Glob,Grep"

      - name: Apply auto-fix labels via PAT
        if: steps.guard.outputs.skip != 'true'
        env:
          # Explicit PAT ensures gh fires a real issues:labeled webhook event.
          # GITHUB_TOKEN is silently blocked from triggering new workflow runs
          # (GitHub anti-loop protection), so the auto-fix workflow would never
          # start if we used it here.
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [[ ! -f /tmp/auto-fix-issues.txt ]]; then
            echo "No issues created — nothing to label."
            exit 0
          fi
          while IFS= read -r issue_number; do
            [[ -z "$issue_number" ]] && continue
            gh issue edit "$issue_number" --add-label "auto-fix" \
              --repo ${{ github.repository }}
            echo "Applied auto-fix label to issue #$issue_number"
          done < /tmp/auto-fix-issues.txt
