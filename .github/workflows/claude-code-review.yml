name: Claude Code Review

on:
  pull_request:
    types: [opened]
    paths-ignore:
      - "package-lock.json"
      - "composer.lock"
      - "yarn.lock"
      - "*.lock"
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: number

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    continue-on-error: true  # review is informational; never block merges
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1

      - name: Resolve PR context
        id: pr_context
        # All ${{...}} values are passed via env to avoid shell-injection paths
        # (untrusted github/inputs context must never be interpolated into run:).
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER_INPUT: ${{ github.event.pull_request.number || inputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          # For pull_request events the number comes from the event payload.
          # For workflow_dispatch it must be supplied via the pr_number input.
          PR_NUMBER="$PR_NUMBER_INPUT"
          if [[ -z "$PR_NUMBER" ]]; then
            echo "::error::No PR number available. Supply pr_number when triggering manually."
            exit 1
          fi
          PR_JSON=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}")
          echo "pr_number=${PR_NUMBER}"                          >> "$GITHUB_OUTPUT"
          echo "pr_url=$(echo "$PR_JSON"    | jq -r '.html_url')" >> "$GITHUB_OUTPUT"
          echo "base_ref=$(echo "$PR_JSON"  | jq -r '.base.ref')" >> "$GITHUB_OUTPUT"
          echo "head_ref=$(echo "$PR_JSON"  | jq -r '.head.ref')" >> "$GITHUB_OUTPUT"

      - name: Guard — skip if this review workflow itself changed
        id: guard
        run: |
          # Only skip when claude-code-review.yml itself is modified — that is the
          # file claude-code-action integrity-checks against main. Changes to other
          # workflow files (pr-checks.yml, release.yml, etc.) do not affect this.
          count=$(gh api \
            "repos/${{ github.repository }}/pulls/${{ steps.pr_context.outputs.pr_number }}/files" \
            --jq '[.[] | select(.filename == ".github/workflows/claude-code-review.yml")] | length')
          if [[ "$count" -gt 0 ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Claude Code Review — this PR modifies claude-code-review.yml itself. The claude-code-action integrity check would fail because the workflow on this branch differs from main."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run Claude Code Review
        if: steps.guard.outputs.skip != 'true'
        id: claude-review
        uses: anthropics/claude-code-action@d44caa1f5268e7643c11e317db4c2ad1e5ea3211 # v1
        env:
          # Use a PAT for all gh calls inside Claude (issue/label creation).
          # Issue numbers are collected after this step and trigger batch auto-fix
          # via a single repository_dispatch event (not per-issue label webhooks).
          GH_TOKEN: ${{ secrets.GH_PAT }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ steps.pr_context.outputs.pr_number }}
            PR URL: ${{ steps.pr_context.outputs.pr_url }}
            BASE BRANCH: ${{ steps.pr_context.outputs.base_ref }}

            Review this pull request against the repository's CLAUDE.md conventions. Be constructive and helpful.

            Check every category below and report findings. Each finding MUST be prefixed with
            its category tag in square brackets, e.g. `[DRY]`, `[Security]`, `[Performance]`.
            For categories where you find nothing wrong, you MUST still output a ✅ line in the
            coverage checklist (see Step 2 format). Do not silently skip a category.

            **Correctness & safety**
            - **[Bugs]** — potential bugs, edge-cases, or logic errors
            - **[Security]** — input sanitisation, escaping, capability checks, nonces
            - **[Data-loss]** — irreversible side-effects, destructive operations

            **Design principles**
            - **[DRY]** — duplicated logic or data that should be extracted into a shared function/constant
            - **[SRP]** — classes or functions doing more than one job; hooks that mix unrelated concerns
            - **[KISS]** — unnecessary complexity, over-engineering, or abstractions with no current use-case
            - **[YAGNI]** — speculative code, flags, or extension points added "just in case"
            - **[Concerns]** — presentation logic leaking into data/business layers (or vice versa)
            - **[Naming]** — misleading, ambiguous, or overly abbreviated identifiers

            **Code quality**
            - **[Dead-code]** — commented-out blocks, unreachable branches
            - **[Complexity]** — deeply nested conditionals or high cyclomatic complexity
            - **[Constants]** — magic numbers/strings that should be named constants
            - **[Style]** — deviations from project conventions (see CLAUDE.md)
            - **[Reuse]** — new code that duplicates or could extend something already in the codebase

            **Performance**
            - **[N+1]** — unnecessary database queries inside loops
            - **[Caching]** — missing caching for expensive operations
            - **[Autoload]** — options that should be non-autoloaded

            **Test coverage**
            - **[Tests]** — untested public methods, critical branches, or only happy-path assertions

            ### Step 0 — Ensure required labels exist

            Before creating any issues, make sure these labels exist (ignore errors if they already do):

              gh label create "code-review" --color "#0075ca" --description "Found during code review" --repo ${{ github.repository }} 2>/dev/null || true
              gh label create "blocking"    --color "#b60205" --description "Blocking issue"            --repo ${{ github.repository }} 2>/dev/null || true
              gh label create "enhancement" --color "#a2eeef" --description "Improvement or suggestion"  --repo ${{ github.repository }} 2>/dev/null || true
              gh label create "nits"        --color "#d4c5f9" --description "Style and minor nits"     --repo ${{ github.repository }} 2>/dev/null || true
              gh label create "auto-fix"    --color "#e4e669" --description "Claude will auto-fix this"  --repo ${{ github.repository }} 2>/dev/null || true

            ### Step 1 — Create issues for follow-up items (do this FIRST to capture URLs)

            For any finding that warrants independent follow-up, create a GitHub issue.

            Classify each finding:
            - **blocking** (bug, security flaw, data loss risk) → labels: `code-review,blocking`, auto-fixable → add to /tmp/auto-fix-issues.txt
            - **improvement** (non-trivial refactor, missing tests, performance) → labels: `code-review,enhancement`, auto-fixable → add to /tmp/auto-fix-issues.txt
            - **nits/style** → collect in memory, create ONE consolidated issue at the end with labels: `code-review,nits`, auto-fixable → add to /tmp/auto-fix-issues.txt

            Example command for a blocking issue (use this exact body format — the auto-fix
            workflow parses it to find the PR number and base branch):

              # Use $'...' quoting so \n is interpreted as real newlines by bash (double quotes do not expand \n).
              ISSUE_URL=$(gh issue create \
                --title "<concise title for the finding>" \
                --body $'Found during review of PR #${{ steps.pr_context.outputs.pr_number }}\n\n**PR:** ${{ steps.pr_context.outputs.pr_url }}\n**Base branch:** ${{ steps.pr_context.outputs.base_ref }}\n\n## Description\n\n<details>\n\n## Context\n\n**File:** `path/to/file.php`, lines N–M\n\n```php\n// paste the relevant ≤25 lines here so the auto-fix session\n// can locate and edit the code without an extra file-read turn\n```' \
                --label "code-review,blocking" \
                --repo ${{ github.repository }})
              ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
              echo "$ISSUE_NUMBER" >> /tmp/auto-fix-issues.txt

            **Always include a `## Context` section** in every issue body (blocking, enhancement, and nits).
            Paste the exact lines from the source file that need changing (≤ 25 lines, fenced code block
            with the correct language identifier). This allows the auto-fix session to skip a file-read
            turn and go straight to editing.

            **For nits:** Collect all nit findings in a single structured list (e.g. in memory or temp file),
            then create ONE consolidated issue with all of them at the end of Step 1:

              NITS_ISSUE=$(gh issue create \
                --title "Review nits: style and minor improvements from PR #${{ steps.pr_context.outputs.pr_number }}" \
                --body $'Found during review of PR #${{ steps.pr_context.outputs.pr_number }}\n\n**PR:** ${{ steps.pr_context.outputs.pr_url }}\n**Base branch:** ${{ steps.pr_context.outputs.base_ref }}\n\n## Nits to address\n\n- [nit 1]\n- [nit 2]\n- [nit 3]' \
                --label "code-review,nits" \
                --repo ${{ github.repository }})
              NITS_NUMBER=$(echo "$NITS_ISSUE" | grep -oE '[0-9]+$')
              echo "$NITS_NUMBER" >> /tmp/auto-fix-issues.txt

            Do NOT apply the `auto-fix` label yourself. A subsequent workflow step collects
            all issue numbers from /tmp/auto-fix-issues.txt and triggers a single batch
            auto-fix session via repository_dispatch — one Claude session fixes all issues
            instead of one session per issue. Only append an issue number to
            /tmp/auto-fix-issues.txt if the fix is **self-contained** — i.e. Claude can
            determine the correct fix purely from the codebase, without needing external
            values such as API keys, account IDs, variant IDs, secrets, or business
            decisions. Issues requiring such information must be fixed manually: create the
            issue but do NOT write its number to /tmp/auto-fix-issues.txt.

            Capture the URL returned by each `gh issue create` call.

            ### Step 2 — Post the review comment on the PR

            Post a single comment on the PR:

              gh pr comment ${{ steps.pr_context.outputs.pr_number }} \
                --body "<your full review>" \
                --repo ${{ github.repository }}

            Structure the comment as:

            1. **Summary** — 1–3 sentence overview of the PR

            2. **Coverage table** — one row per category, always present, no exceptions:
               ```
               | Category    | Status | Note |
               |-------------|--------|------|
               | Bugs        | ✅     | — |
               | Security    | 🔴     | `includes/Foo.php` capability check missing — See #N |
               | Data-loss   | ✅     | — |
               | DRY         | ✅     | — |
               | SRP         | 🟡     | `SeoModule` mixes HTTP and business logic — See #N |
               | KISS        | ✅     | — |
               | YAGNI       | ✅     | — |
               | Concerns    | ✅     | — |
               | Naming      | 🔵     | See #N |
               | Dead-code   | ✅     | — |
               | Complexity  | ✅     | — |
               | Constants   | ✅     | — |
               | Style       | ✅     | — |
               | Reuse       | ✅     | — |
               | N+1         | ✅     | — |
               | Caching     | ✅     | — |
               | Autoload    | ✅     | — |
               | Tests       | 🟡     | missing error-path coverage — See #N |
               ```
               Use 🔴 for bugs/blocking, 🟡 for improvements, 🔵 for nits, ✅ for clean.
               Every category must appear — checked and clean rows prove the review was thorough.

            3. **Findings detail** — only for categories that have issues, grouped by severity
               (bugs → improvements → nits). Each finding must open with its tag:
               - `[Category] \`path/to/file.php\` lines N–M — description (See #N for tracking.)`
               - **For nits:** give the full verbose explanation, then end the section with:
                 "All nits are tracked in #N for auto-fix."

            4. **Verdict** — Approved / Needs changes / Needs discussion

          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://docs.claude.com/en/docs/claude-code/sdk#command-line for available options
          claude_args: "--model claude-opus-4-8 --allowedTools Bash(gh:*),Read,Glob,Grep"

      - name: Collect auto-fix issue numbers
        id: collect
        if: steps.guard.outputs.skip != 'true'
        run: |
          if [[ ! -f /tmp/auto-fix-issues.txt ]]; then
            echo "No issues created — nothing to auto-fix."
            echo "issues=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Build a compact JSON array of integers, e.g. [274, 275]
          ISSUES=$(grep -v '^[[:space:]]*$' /tmp/auto-fix-issues.txt \
            | jq -R 'tonumber' | jq -s -c '.')
          echo "issues=${ISSUES}" >> "$GITHUB_OUTPUT"
          echo "Collected issues for batch auto-fix: ${ISSUES}"

      - name: Trigger batch auto-fix via repository_dispatch
        # Fire ONE event carrying all issue numbers — a single Claude session
        # fixes them all, saving (N-1) cold-start session costs per PR.
        # All ${{...}} values are passed via env to avoid shell-injection paths.
        if: |
          steps.guard.outputs.skip != 'true' &&
          steps.collect.outputs.issues != '[]' &&
          steps.collect.outputs.issues != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          ISSUES_JSON: ${{ steps.collect.outputs.issues }}
          PR_NUMBER: ${{ steps.pr_context.outputs.pr_number }}
          PR_URL: ${{ steps.pr_context.outputs.pr_url }}
          BASE_REF: ${{ steps.pr_context.outputs.base_ref }}
          HEAD_REF: ${{ steps.pr_context.outputs.head_ref }}
          REPO: ${{ github.repository }}
        run: |
          # Build payload with jq so values are properly escaped as JSON.
          jq -n \
            --argjson issues "$ISSUES_JSON" \
            --argjson pr_number "$PR_NUMBER" \
            --arg pr_url "$PR_URL" \
            --arg base_ref "$BASE_REF" \
            --arg head_ref "$HEAD_REF" \
            '{
              event_type: "batch-auto-fix",
              client_payload: {
                issue_numbers: $issues,
                pr_number: $pr_number,
                pr_url: $pr_url,
                base_branch: $base_ref,
                head_branch: $head_ref
              }
            }' \
            | gh api "repos/$REPO/dispatches" --method POST --input -
          echo "Dispatched batch-auto-fix for issues: $ISSUES_JSON"
